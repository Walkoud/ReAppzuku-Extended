name: Android CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      run: |-
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          echo "Keystore decoded successfully"
        else
          echo "KEYSTORE_BASE64 not set, using debug signing"
        fi
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ github.ref_name }}
        body: |
          **v1.8.5-extended**

          New features compared to the original ReAppzuku:

          - **Select All Filtered:** Select/deselect all visible apps in one tap — Whitelist, Blacklist, Background Restrictions, Sleep Mode, Hidden apps.
          - **Enhanced Filters:** Filter by restriction type (Soft/Medium/Hard/Manual) in Background Restrictions dialogs.
          - **Batch restriction type:** Apply Soft/Medium/Hard to multiple selected apps at once.
          - **Auto Install Template:** Automatically apply background restriction (Soft/Medium/Hard) to newly installed apps.
          - **Android 14+ & HyperOS support:** Reliable package detection on Chinese OEMs.
          - **Extended Backup:** Custom standby buckets, whitelist removal flags, and sleep mode suspend method are preserved during backup/restore.
        files: app/build/outputs/apk/release/*.apk
