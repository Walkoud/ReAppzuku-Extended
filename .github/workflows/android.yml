name: Build ReAppzuku

on:
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Rename APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk ReAppzuku_1.8.4.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v7
      with:
        name: ReAppzuku_1.8.4
        path: ReAppzuku_1.8.4.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v1.8.4
        name: ReAppzuku v1.8.4
        body: |
          Debug build with "Select all" button in whitelist dialog.
        files: ReAppzuku_1.8.4.apk
        make_latest: true
